    // ========== CHATBOT ==========
    function Chatbot({ isOpen, onToggle }) {
      const [messages, setMessages] = useState([]);
      const [step, setStep] = useState("welcome");
      const [inputValue, setInputValue] = useState("");
      const [budget, setBudget] = useState({ servicio: "", cantidad: 0, nombre: "", telefono: "", email: "", descripcion: "", comuna: "" });
      const [typing, setTyping] = useState(false);
      const messagesEndRef = useRef(null);
      const initialized = useRef(false);
      const budgetRef = useRef(budget);
      budgetRef.current = budget;

      const scrollToBottom = () => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); };
      useEffect(() => { scrollToBottom(); }, [messages, typing]);

      const addBotMessage = useCallback((text, options) => {
        setTyping(true);
        setTimeout(() => {
          setTyping(false);
          setMessages(prev => [...prev, { id: genId(), sender: "bot", text, options, timestamp: new Date() }]);
        }, 600);
      }, []);

      const addUserMessage = useCallback((text) => {
        setMessages(prev => [...prev, { id: genId(), sender: "user", text, timestamp: new Date() }]);
      }, []);

      useEffect(() => {
        if (isOpen && !initialized.current) {
          initialized.current = true;
          addBotMessage("👋 ¡Hola! Soy el asistente virtual de **Construcción & Servicios ZF**. ¿En qué puedo ayudarte hoy?", [
            { label: "Solicitar presupuesto", value: "presupuesto", emoji: "💰" },
            { label: "Ver servicios", value: "servicios", emoji: "🔧" },
            { label: "Preguntas frecuentes", value: "faq", emoji: "❓" },
            { label: "Hablar con un asesor", value: "asesor", emoji: "👤" },
          ]);
          setStep("menu");
        }
      }, [isOpen, addBotMessage]);

      const handleMenuChoice = useCallback((value) => {
        switch (value) {
          case "presupuesto":
            addBotMessage("¡Genial! Vamos a preparar tu presupuesto. Primero, ¿qué servicio necesitas?",
              SERVICIOS.map(s => ({ label: `${s.icono} ${s.nombre}`, value: s.id }))
            );
            setStep("select_service");
            break;
          case "servicios":
            let msg = "📋 **Nuestros servicios:**\n\n";
            SERVICIOS.forEach(s => { msg += `${s.icono} **${s.nombre}**\n${formatCLP(s.precioBase)} por ${s.unidad}\n\n`; });
            msg += "¿Te gustaría cotizar alguno de estos servicios?";
            addBotMessage(msg, [
              { label: "Sí, quiero cotizar", value: "presupuesto", emoji: "💰" },
              { label: "Volver al menú", value: "volver_menu", emoji: "↩️" },
            ]);
            setStep("faq_answer");
            break;
          case "faq":
            addBotMessage("¿Qué te gustaría saber?", FAQ_ITEMS.map((f, i) => ({ label: f.pregunta, value: `faq_${i}`, emoji: "📌" })));
            setStep("faq_menu");
            break;
          case "asesor":
            addBotMessage("📞 Puedes contactar a nuestro equipo directamente:\n\n📧 **Email:** construcctorayservicios@gmail.com\n📷 **Instagram:** @Construccionyservicioszf.cl\n\n📱 **WhatsApp:** Próximamente\n\nTe responderemos a la brevedad. ¿Hay algo más en lo que pueda ayudarte?", [
              { label: "Solicitar presupuesto", value: "presupuesto", emoji: "💰" },
              { label: "Volver al menú", value: "volver_menu", emoji: "↩️" },
            ]);
            setStep("faq_answer");
            break;
          case "volver_menu":
            addBotMessage("¿En qué más puedo ayudarte?", [
              { label: "Solicitar presupuesto", value: "presupuesto", emoji: "💰" },
              { label: "Ver servicios", value: "servicios", emoji: "🔧" },
              { label: "Preguntas frecuentes", value: "faq", emoji: "❓" },
              { label: "Hablar con un asesor", value: "asesor", emoji: "👤" },
            ]);
            setStep("menu");
            break;
          default:
            addBotMessage("No entendí. Por favor selecciona una opción.", [
              { label: "Solicitar presupuesto", value: "presupuesto", emoji: "💰" },
              { label: "Volver al menú", value: "volver_menu", emoji: "↩️" },
            ]);
            setStep("menu");
        }
      }, [addBotMessage]);

      const processInput = useCallback((value) => {
        // We need step via a ref to avoid stale closures
        const currentStep = stepRef.current;
        const currentBudget = budgetRef.current;

        switch (currentStep) {
          case "menu":
          case "faq_answer":
            handleMenuChoice(value);
            break;
          case "faq_menu":
            if (value.startsWith("faq_")) {
              const idx = parseInt(value.split("_")[1]);
              const faq = FAQ_ITEMS[idx];
              if (faq) {
                addBotMessage(`📌 **${faq.pregunta}**\n\n${faq.respuesta}\n\n¿Necesitas algo más?`, [
                  { label: "Otra pregunta", value: "faq", emoji: "❓" },
                  { label: "Solicitar presupuesto", value: "presupuesto", emoji: "💰" },
                  { label: "Volver al menú", value: "volver_menu", emoji: "↩️" },
                ]);
                setStep("faq_answer");
              }
            } else { handleMenuChoice(value); }
            break;
          case "select_service":
            const servicio = SERVICIOS.find(s => s.id === value);
            if (servicio) {
              setBudget(prev => ({ ...prev, servicio: servicio.id }));
              const unitLabel = servicio.unidad === "m²" ? "¿Cuántos metros cuadrados (m²) aproximados necesitas?" : servicio.unidad === "ml" ? "¿Cuántos metros lineales aproximados necesitas?" : "¿Cuántos proyectos/unidades necesitas? (escribe 1 si es un solo trabajo)";
              addBotMessage(`✅ **${servicio.nombre}** — ${formatCLP(servicio.precioBase)}/${servicio.unidad}\n\n${unitLabel}\n\n💡 *Escribe un número aproximado, no te preocupes si no es exacto.*`);
              setStep("ask_cantidad");
            } else {
              addBotMessage("No encontré ese servicio. Selecciona una opción:", SERVICIOS.map(s => ({ label: `${s.icono} ${s.nombre}`, value: s.id })));
            }
            break;
          case "ask_cantidad":
            const num = parseFloat(value.replace(/[^\d.,]/g, "").replace(",", "."));
            if (isNaN(num) || num <= 0) { addBotMessage("⚠️ Por favor ingresa un número válido mayor a 0. Por ejemplo: 25"); return; }
            setBudget(prev => ({ ...prev, cantidad: num }));
            addBotMessage(`📐 Perfecto, ${num} ${SERVICIOS.find(s => s.id === currentBudget.servicio)?.unidad || "unidades"}.\n\n¿En qué comuna de Santiago se realizaría el trabajo?`,
              COMUNAS_SANTIAGO.slice(0, 8).map(c => ({ label: c, value: c }))
            );
            setStep("ask_comuna");
            break;
          case "ask_comuna":
            setBudget(prev => ({ ...prev, comuna: value }));
            addBotMessage(`📍 **${value}**, anotado.\n\n¿Puedes darnos una breve descripción del trabajo que necesitas?`);
            setStep("ask_descripcion");
            break;
          case "ask_descripcion":
            setBudget(prev => ({ ...prev, descripcion: value }));
            addBotMessage("👤 ¿Cuál es tu nombre completo?");
            setStep("ask_nombre");
            break;
          case "ask_nombre":
            setBudget(prev => ({ ...prev, nombre: value }));
            addBotMessage("📱 ¿Tu número de teléfono? (para contactarte con el presupuesto)");
            setStep("ask_telefono");
            break;
          case "ask_telefono":
            setBudget(prev => ({ ...prev, telefono: value }));
            addBotMessage("📧 Por último, ¿tu correo electrónico? (escribe 'no' si prefieres no darlo)");
            setStep("ask_email");
            break;
          case "ask_email":
            const email = value.toLowerCase() === "no" ? "No proporcionado" : value;
            // Use functional update to get latest budget
            setBudget(prev => {
              const updated = { ...prev, email };
              const srv = SERVICIOS.find(s => s.id === updated.servicio);
              if (!srv) return updated;
              const subtotal = srv.precioBase * updated.cantidad;
              const iva = Math.round(subtotal * 0.19);
              const total = subtotal + iva;
              const resumen = `🧾 **PRESUPUESTO ESTIMADO**\n━━━━━━━━━━━━━━━━━━━━━━\n\n🔧 **Servicio:** ${srv.nombre}\n📐 **Cantidad:** ${updated.cantidad} ${srv.unidad}\n💲 **Precio unitario:** ${formatCLP(srv.precioBase)}/${srv.unidad}\n📍 **Comuna:** ${updated.comuna}\n\n━━━━━━━━━━━━━━━━━━━━━━\n**Subtotal:** ${formatCLP(subtotal)}\n**IVA (19%):** ${formatCLP(iva)}\n**💰 TOTAL ESTIMADO: ${formatCLP(total)}**\n━━━━━━━━━━━━━━━━━━━━━━\n\n👤 **Cliente:** ${updated.nombre}\n📱 **Teléfono:** ${updated.telefono}\n📧 **Email:** ${email}\n📝 **Descripción:** ${updated.descripcion}\n\n⚠️ *Este es un presupuesto estimado. El precio final puede variar según la visita técnica al lugar del proyecto.*\n\n¿Qué te gustaría hacer?`;
              addBotMessage(resumen, [
                { label: "📞 Contactar por WhatsApp", value: "whatsapp", emoji: "📱" },
                { label: "📧 Enviar por email", value: "email_budget", emoji: "📧" },
                { label: "Nueva cotización", value: "nueva", emoji: "🔄" },
                { label: "Volver al menú", value: "volver_menu", emoji: "↩️" },
              ]);
              return updated;
            });
            setStep("show_budget");
            break;
          case "show_budget":
          case "goodbye":
            if (value === "whatsapp") {
              addBotMessage("📱 **WhatsApp aún no configurado.**\n\nPronto habilitaremos este canal. Por ahora puedes escribirnos a:\n📧 construcctorayservicios@gmail.com\n\n¿Algo más?", [
                { label: "Nueva cotización", value: "nueva", emoji: "🔄" },
                { label: "Volver al menú", value: "volver_menu", emoji: "↩️" },
              ]);
              setStep("goodbye");
            } else if (value === "email_budget") {
              addBotMessage("📧 ¡Listo! Hemos registrado tu solicitud. Nuestro equipo te contactará dentro de las próximas **24 horas hábiles** con un presupuesto detallado.\n\n¿Algo más?", [
                { label: "Nueva cotización", value: "nueva", emoji: "🔄" },
                { label: "Volver al menú", value: "volver_menu", emoji: "↩️" },
              ]);
              setStep("goodbye");
            } else if (value === "nueva") {
              setBudget({ servicio: "", cantidad: 0, nombre: "", telefono: "", email: "", descripcion: "", comuna: "" });
              handleMenuChoice("presupuesto");
            } else { handleMenuChoice(value); }
            break;
          default:
            addBotMessage("No entendí tu mensaje. ¿Puedes intentar de nuevo?");
        }
      }, [addBotMessage, handleMenuChoice]);

      const stepRef = useRef(step);
      stepRef.current = step;

      const handleOption = (opt) => { addUserMessage(opt.label); setTimeout(() => processInput(opt.value), 50); };
      const handleTextSubmit = () => {
        if (!inputValue.trim()) return;
        const val = inputValue.trim();
        addUserMessage(val);
        setInputValue("");
        setTimeout(() => processInput(val), 50);
      };

      const showInput = ["ask_cantidad","ask_comuna","ask_descripcion","ask_nombre","ask_telefono","ask_email"].includes(step);

      const renderText = (text) => {
        const parts = text.split(/(\*\*.*?\*\*)/g);
        return parts.map((part, i) => {
          if (part.startsWith("**") && part.endsWith("**")) return <strong key={i} className="font-bold">{part.slice(2,-2)}</strong>;
          const ip = part.split(/(\*.*?\*)/g);
          return ip.map((p, j) => {
            if (p.startsWith("*") && p.endsWith("*") && !p.startsWith("**")) return <em key={`${i}-${j}`} className="italic opacity-50">{p.slice(1,-1)}</em>;
            return <span key={`${i}-${j}`}>{p}</span>;
          });
        });
      };

      return (
        <>
          {!isOpen && (
            <button onClick={onToggle} className="fixed bottom-6 right-6 z-50 w-14 h-14 rounded-full bg-[#1e40af] text-white shadow-xl flex items-center justify-center animate-bounce-slow hover:bg-[#1e40af]/90 transition-colors">
              <IconMessageCircle />
            </button>
          )}

          {isOpen && (
            <div className="fixed bottom-0 right-0 md:bottom-4 md:right-4 z-50 w-full md:w-96 h-full md:h-[600px] md:max-h-[80vh] flex flex-col bg-white md:rounded-xl shadow-2xl border border-[#e8e0d4]">
              <div className="bg-gradient-to-r from-[#1a2332] to-[#1e40af] text-white p-4 md:rounded-t-xl flex items-center justify-between shrink-0">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center text-lg">🏗️</div>
                  <div>
                    <p className="font-bold text-sm">Asistente ZF</p>
                    <p className="text-xs text-white/70">En línea • Respuesta inmediata</p>
                  </div>
                </div>
                <button onClick={onToggle} className="p-1 hover:bg-white/10 rounded-full transition-colors"><IconX /></button>
              </div>

              <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-[#f7f3ed]/50">
                {messages.map(msg => (
                  <div key={msg.id} className={`flex ${msg.sender === "user" ? "justify-end" : "justify-start"}`}>
                    <div className={`max-w-[85%] rounded-2xl px-4 py-2.5 text-sm leading-relaxed whitespace-pre-line ${msg.sender === "user" ? "bg-[#1e40af] text-white rounded-br-sm" : "bg-white text-[#2d2a26] shadow-sm rounded-bl-sm"}`}>
                      {renderText(msg.text)}
                      {msg.options && msg.options.length > 0 && (
                        <div className="mt-3 space-y-1.5">
                          {msg.options.map(opt => (
                            <button key={opt.value} onClick={() => handleOption(opt)} className="w-full text-left px-3 py-2 rounded-lg border border-[#1e40af]/30 text-[#1e40af] text-xs font-normal hover:bg-[#1e40af]/5 transition-colors">
                              {opt.emoji && <span className="mr-1">{opt.emoji}</span>}{opt.label}
                            </button>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                ))}
                {typing && (
                  <div className="flex justify-start">
                    <div className="bg-white rounded-2xl rounded-bl-sm px-4 py-3 shadow-sm">
                      <span className="inline-flex gap-1"><span className="w-2 h-2 bg-[#1e40af] rounded-full animate-bounce" style={{animationDelay:"0ms"}}></span><span className="w-2 h-2 bg-[#1e40af] rounded-full animate-bounce" style={{animationDelay:"150ms"}}></span><span className="w-2 h-2 bg-[#1e40af] rounded-full animate-bounce" style={{animationDelay:"300ms"}}></span></span>
                    </div>
                  </div>
                )}
                <div ref={messagesEndRef} />
              </div>

              <div className="p-3 bg-white border-t border-[#e8e0d4] md:rounded-b-xl shrink-0">
                {showInput ? (
                  <form onSubmit={e => { e.preventDefault(); handleTextSubmit(); }} className="flex gap-2">
                    <input type="text" className="flex-1 px-3 py-2 rounded-lg border border-[#e8e0d4] text-sm focus:outline-none focus:border-[#1e40af]" placeholder="Escribe tu respuesta..." value={inputValue} onChange={e => setInputValue(e.target.value)} autoFocus />
                    <button type="submit" className="w-9 h-9 rounded-full bg-[#1e40af] text-white flex items-center justify-center hover:bg-[#1e40af]/90"><IconSend /></button>
                  </form>
                ) : (
                  <p className="text-xs text-center text-[#2d2a26]/40">Selecciona una opción del chat ☝️</p>
                )}
              </div>
            </div>
          )}
        </>
      );
    }

    // ========== APP ==========
    function App() {
      const [activeSection, setActiveSection] = useState("inicio");
      const [chatOpen, setChatOpen] = useState(false);

      const refs = {
        inicio: useRef(null),
        servicios: useRef(null),
        portafolio: useRef(null),
        nosotros: useRef(null),
        contacto: useRef(null),
      };

      const navigateTo = useCallback((section) => {
        const ref = refs[section];
        if (ref?.current) {
          ref.current.scrollIntoView({ behavior: "smooth" });
          setActiveSection(section);
        }
      }, []);

      const toggleChat = useCallback(() => setChatOpen(prev => !prev), []);

      return (
        <div className="min-h-screen bg-white">
          <Navbar activeSection={activeSection} onNavigate={navigateTo} />
          <div ref={refs.inicio}><Hero onNavigate={navigateTo} onOpenChat={toggleChat} /></div>
          <div ref={refs.servicios}><Services onOpenChat={toggleChat} /></div>
          <div ref={refs.portafolio}><Portfolio /></div>
          <div ref={refs.nosotros}><About /></div>
          <div ref={refs.contacto}><Contact onOpenChat={toggleChat} /></div>
          <Footer onNavigate={navigateTo} />
          <Chatbot isOpen={chatOpen} onToggle={toggleChat} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
