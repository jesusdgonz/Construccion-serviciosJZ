      <div className="bg-base-100 rounded-2xl rounded-bl-sm px-4 py-3 shadow-sm">

function renderText(text) {
  const parts = text.split(/(\*\*.*?\*\*)/g);
  return parts.map((part, i) => {
    if (part.startsWith("**") && part.endsWith("**")) {
      return <strong key={i} className="font-bold">{part.slice(2,-2)}</strong>;
    }
    const italicParts = part.split(/(\*.*?\*)/g);
    return italicParts.map((ip, j) => {
      if (ip.startsWith("*") && ip.endsWith("*") && !ip.startsWith("**")) {
        return <em key={`${i}-${j}`} className="italic text-base-content/50">{ip.slice(1,-1)}</em>;
      }
      return <span key={`${i}-${j}`}>{ip}</span>;
    });
  });
}

function Chatbot({ isOpen, onToggle }) {
  const [messages, setMessages] = useState([]);
  const [step, setStep] = useState("welcome");
  const [inputValue, setInputValue] = useState("");
  const [budget, setBudget] = useState({ servicio:"", cantidad:0, nombre:"", telefono:"", email:"", descripcion:"", comuna:"" });
  const [typing, setTyping] = useState(false);
  const messagesEndRef = useRef(null);
  const initialized = useRef(false);

  useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior:"smooth" }); }, [messages, typing]);

  const addBotMessage = (text, options) => {
    setTyping(true);
    setTimeout(() => {
      setTyping(false);
      setMessages(prev => [...prev, { id:genId(), sender:"bot", text, options, timestamp:new Date() }]);
    }, 600);
  };

  const addUserMessage = (text) => {
    setMessages(prev => [...prev, { id:genId(), sender:"user", text, timestamp:new Date() }]);
  };

  useEffect(() => {
    if (isOpen && !initialized.current) {
      initialized.current = true;
      addBotMessage("👋 ¡Hola! Soy el asistente virtual de **Construcción & Servicios ZF**. ¿En qué puedo ayudarte hoy?", [
        { label:"Solicitar presupuesto", value:"presupuesto", emoji:"💰" },
        { label:"Ver servicios", value:"servicios", emoji:"🔧" },
        { label:"Preguntas frecuentes", value:"faq", emoji:"❓" },
        { label:"Hablar con un asesor", value:"asesor", emoji:"👤" },
      ]);
      setStep("menu");
    }
  }, [isOpen]);

  const handleOption = (option) => { addUserMessage(option.label); processInput(option.value); };
  const handleTextSubmit = () => {
    if (!inputValue.trim()) return;
    const val = inputValue.trim();
    addUserMessage(val); setInputValue(""); processInput(val);
  };

  const processInput = (value) => {
    setStep(prev => {
      switch(prev) {
        case "menu": handleMenuChoice(value); return prev;
        case "faq_menu": handleFaqChoice(value); return prev;
        case "faq_answer": handleMenuChoice(value); return prev;
        case "select_service": handleServiceSelect(value); return prev;
        case "ask_cantidad": handleCantidad(value); return prev;
        case "ask_comuna": handleComuna(value); return prev;
        case "ask_descripcion": handleDescripcion(value); return prev;
        case "ask_nombre": handleNombre(value); return prev;
        case "ask_telefono": handleTelefono(value); return prev;
        case "ask_email": handleEmail(value); return prev;
        case "show_budget":
        case "goodbye": handlePostBudget(value); return prev;
        default: addBotMessage("No entendí tu mensaje. ¿Puedes intentar de nuevo?"); return prev;
      }
    });
  };

  const handleMenuChoice = (value) => {
    switch(value) {
      case "presupuesto":
        addBotMessage("¡Genial! Vamos a preparar tu presupuesto. Primero, ¿qué servicio necesitas?",
          SERVICIOS.map(s => ({ label:`${s.icono} ${s.nombre}`, value:s.id })));
        setStep("select_service"); break;
      case "servicios":
        let msg = "📋 **Nuestros servicios:**\n\n";
        SERVICIOS.forEach(s => { msg += `${s.icono} **${s.nombre}**\n${formatCLP(s.precioBase)} por ${s.unidad}\n\n`; });
        msg += "¿Te gustaría cotizar alguno de estos servicios?";
        addBotMessage(msg, [
          { label:"Sí, quiero cotizar", value:"presupuesto", emoji:"💰" },
          { label:"Volver al menú", value:"volver_menu", emoji:"↩️" },
        ]);
        setStep("faq_answer"); break;
      case "faq":
        addBotMessage("¿Qué te gustaría saber?", FAQ_ITEMS.map((f,i) => ({ label:f.pregunta, value:`faq_${i}`, emoji:"📌" })));
        setStep("faq_menu"); break;
      case "asesor":
        addBotMessage("📞 Puedes contactar a nuestro equipo directamente:\n\n📧 **Email:** construcctorayservicios@gmail.com\n📷 **Instagram:** @Construccionyservicioszf.cl\n\n📱 **WhatsApp:** Próximamente\n\nTe responderemos a la brevedad. ¿Hay algo más en lo que pueda ayudarte?", [
          { label:"Solicitar presupuesto", value:"presupuesto", emoji:"💰" },
          { label:"Volver al menú", value:"volver_menu", emoji:"↩️" },
        ]);
        setStep("faq_answer"); break;
      case "volver_menu":
        addBotMessage("¿En qué más puedo ayudarte?", [
          { label:"Solicitar presupuesto", value:"presupuesto", emoji:"💰" },
          { label:"Ver servicios", value:"servicios", emoji:"🔧" },
          { label:"Preguntas frecuentes", value:"faq", emoji:"❓" },
          { label:"Hablar con un asesor", value:"asesor", emoji:"👤" },
        ]);
        setStep("menu"); break;
      default:
        addBotMessage("Por favor selecciona una opción.", [
          { label:"Solicitar presupuesto", value:"presupuesto", emoji:"💰" },
          { label:"Volver al menú", value:"volver_menu", emoji:"↩️" },
        ]);
        setStep("menu");
    }
  };

  const handleFaqChoice = (value) => {
    if (value.startsWith("faq_")) {
      const idx = parseInt(value.split("_")[1]);
      const faq = FAQ_ITEMS[idx];
      if (faq) {
        addBotMessage(`📌 **${faq.pregunta}**\n\n${faq.respuesta}\n\n¿Necesitas algo más?`, [
          { label:"Otra pregunta", value:"faq", emoji:"❓" },
          { label:"Solicitar presupuesto", value:"presupuesto", emoji:"💰" },
          { label:"Volver al menú", value:"volver_menu", emoji:"↩️" },
        ]);
        setStep("faq_answer");
      }
    } else { handleMenuChoice(value); }
  };

  const handleServiceSelect = (value) => {
    const servicio = SERVICIOS.find(s => s.id === value);
    if (servicio) {
      setBudget(prev => ({ ...prev, servicio: servicio.id }));
      const unitLabel = servicio.unidad === "m²" ? "¿Cuántos metros cuadrados (m²) aproximados necesitas?"
        : servicio.unidad === "ml" ? "¿Cuántos metros lineales aproximados necesitas?"
        : "¿Cuántos proyectos/unidades necesitas? (escribe 1 si es un solo trabajo)";
      addBotMessage(`✅ **${servicio.nombre}** — ${formatCLP(servicio.precioBase)}/${servicio.unidad}\n\n${unitLabel}\n\n💡 *Escribe un número aproximado, no te preocupes si no es exacto.*`);
      setStep("ask_cantidad");
    }
  };

  const handleCantidad = (value) => {
    const num = parseFloat(value.replace(/[^\d.,]/g,"").replace(",","."));
    if (isNaN(num) || num <= 0) { addBotMessage("⚠️ Por favor ingresa un número válido mayor a 0. Por ejemplo: 25"); return; }
    setBudget(prev => ({ ...prev, cantidad: num }));
    addBotMessage(`📐 Perfecto.\n\n¿En qué comuna de Santiago se realizaría el trabajo?`,
      COMUNAS_SANTIAGO.slice(0,8).map(c => ({ label:c, value:c })));
    setStep("ask_comuna");
  };

  const handleComuna = (value) => {
    setBudget(prev => ({ ...prev, comuna: value }));
    addBotMessage(`📍 **${value}**, anotado.\n\n¿Puedes darnos una breve descripción del trabajo que necesitas?`);
    setStep("ask_descripcion");
  };

  const handleDescripcion = (value) => {
    setBudget(prev => ({ ...prev, descripcion: value }));
    addBotMessage("👤 ¿Cuál es tu nombre completo?");
    setStep("ask_nombre");
  };

  const handleNombre = (value) => {
    setBudget(prev => ({ ...prev, nombre: value }));
    addBotMessage("📱 ¿Tu número de teléfono?");
    setStep("ask_telefono");
  };

  const handleTelefono = (value) => {
    setBudget(prev => ({ ...prev, telefono: value }));
    addBotMessage("📧 Por último, ¿tu correo electrónico? (escribe 'no' si prefieres no darlo)");
    setStep("ask_email");
  };

  const handleEmail = (value) => {
    const email = value.toLowerCase() === "no" ? "No proporcionado" : value;
    const updatedBudget = { ...budget, email };
    setBudget(updatedBudget);
    const servicio = SERVICIOS.find(s => s.id === updatedBudget.servicio);
    if (!servicio) return;
    const subtotal = servicio.precioBase * updatedBudget.cantidad;
    const iva = Math.round(subtotal * 0.19);
    const total = subtotal + iva;
    const resumen =
      `🧾 **PRESUPUESTO ESTIMADO**\n━━━━━━━━━━━━━━━━━━━━━━\n\n` +
      `🔧 **Servicio:** ${servicio.nombre}\n` +
      `📐 **Cantidad:** ${updatedBudget.cantidad} ${servicio.unidad}\n` +
      `💲 **Precio unitario:** ${formatCLP(servicio.precioBase)}/${servicio.unidad}\n` +
      `📍 **Comuna:** ${updatedBudget.comuna}\n\n` +
      `━━━━━━━━━━━━━━━━━━━━━━\n` +
      `**Subtotal:** ${formatCLP(subtotal)}\n` +
      `**IVA (19%):** ${formatCLP(iva)}\n` +
      `**💰 TOTAL ESTIMADO: ${formatCLP(total)}**\n` +
      `━━━━━━━━━━━━━━━━━━━━━━\n\n` +
      `👤 **Cliente:** ${updatedBudget.nombre}\n` +
      `📱 **Teléfono:** ${updatedBudget.telefono}\n` +
      `📧 **Email:** ${email}\n` +
      `📝 **Descripción:** ${updatedBudget.descripcion}\n\n` +
      `⚠️ *Este es un presupuesto estimado. El precio final puede variar según la visita técnica.*\n\n¿Qué te gustaría hacer?`;
    addBotMessage(resumen, [
      { label:"📞 Contactar por WhatsApp", value:"whatsapp", emoji:"📱" },
      { label:"📧 Enviar por email", value:"email_budget", emoji:"📧" },
      { label:"Nueva cotización", value:"nueva", emoji:"🔄" },
      { label:"Volver al menú", value:"volver_menu", emoji:"↩️" },
    ]);
    setStep("show_budget");
  };

  const handlePostBudget = (value) => {
    switch(value) {
      case "whatsapp":
        addBotMessage("📱 **WhatsApp aún no configurado.**\n\nPor ahora puedes escribirnos a:\n📧 construcctorayservicios@gmail.com\n\n¿Algo más?", [
          { label:"Nueva cotización", value:"nueva", emoji:"🔄" },
          { label:"Volver al menú", value:"volver_menu", emoji:"↩️" },
        ]);
        setStep("goodbye"); break;
      case "email_budget":
        addBotMessage("📧 ¡Listo! Hemos registrado tu solicitud. Nuestro equipo te contactará dentro de las próximas **24 horas hábiles**.\n\n¿Algo más?", [
          { label:"Nueva cotización", value:"nueva", emoji:"🔄" },
          { label:"Volver al menú", value:"volver_menu", emoji:"↩️" },
        ]);
        setStep("goodbye"); break;
      case "nueva":
        setBudget({ servicio:"", cantidad:0, nombre:"", telefono:"", email:"", descripcion:"", comuna:"" });
        handleMenuChoice("presupuesto"); break;
      default: handleMenuChoice(value);
    }
  };

  const showInput = ["ask_cantidad","ask_comuna","ask_descripcion","ask_nombre","ask_telefono","ask_email"].includes(step);

                <input type="text" className="input input-bordered input-sm flex-1" placeholder="Escribe tu respuesta..."
                  value={inputValue} onChange={e => setInputValue(e.target.value)} autoFocus />
                <button type="submit" className="btn btn-sm btn-circle text-white border-0" style={{background:'#1e40af'}}><Send size={16} /></button>
              </form>
            ) : (
              <p className="text-xs text-center text-base-content/40">Selecciona una opción del chat ☝️</p>
            )}
          </div>
        </div>
      )}
    </>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {
  const [activeSection, setActiveSection] = useState("inicio");
  const [chatOpen, setChatOpen] = useState(false);

  const sectionRefs = {
    inicio: useRef(null),
    servicios: useRef(null),
    portafolio: useRef(null),
    nosotros: useRef(null),
    contacto: useRef(null),
  };

  const navigateTo = useCallback((section) => {
    const ref = sectionRefs[section];
    if (ref?.current) {
      ref.current.scrollIntoView({ behavior:"smooth" });
      setActiveSection(section);
    }
  }, []);

  const toggleChat = useCallback(() => setChatOpen(prev => !prev), []);

  return (
    <div className="min-h-screen bg-base-100">
      <Navbar activeSection={activeSection} onNavigate={navigateTo} />
      <div ref={sectionRefs.inicio}><Hero onNavigate={navigateTo} onOpenChat={toggleChat} /></div>
      <div ref={sectionRefs.servicios} className="section-animate"><Services onOpenChat={toggleChat} /></div>
      <div ref={sectionRefs.portafolio} className="section-animate"><Portfolio /></div>
      <div ref={sectionRefs.nosotros} className="section-animate"><About /></div>
      <div ref={sectionRefs.contacto} className="section-animate"><Contact onOpenChat={toggleChat} /></div>
      <Footer onNavigate={navigateTo} />
      <Chatbot isOpen={chatOpen} onToggle={toggleChat} />
    </div>
  );
}

createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
